name: Build Windows EXE Variants

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            bootloader: "stock"
          - python-version: "3.11"
            bootloader: "stock"
          - python-version: "3.10"
            bootloader: "custom"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install stock PyInstaller
        if: matrix.bootloader == 'stock'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller==6.16.0

      - name: Build and install custom PyInstaller bootloader
        if: matrix.bootloader == 'custom'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          git clone --depth 1 --branch v6.16.0 https://github.com/pyinstaller/pyinstaller.git pyinstaller-src
          cd pyinstaller-src\bootloader
          python ./waf all
          cd ..
          python -m pip install .
          python -m PyInstaller --version

      - name: Build EXE
        shell: pwsh
        run: |
          Remove-Item -Force "*.spec" -ErrorAction SilentlyContinue

          python -m PyInstaller `
            --onefile `
            --console `
            --clean `
            --noupx `
            --name "LoKDR_Text_Tool_NooB" `
            --icon "pic.ico" `
            --version-file "version_info.txt" `
            --distpath "dist" `
            --workpath "build" `
            --specpath "." `
            "LoKDR_Text_Tool_NooB.py"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LoKDR_Text_Tool_NooB_py${{ matrix.python-version }}_${{ matrix.bootloader }}
          path: dist/LoKDR_Text_Tool_NooB.exe
